<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col antialiased selection:bg-primary/30 selection:text-primary-fixed">

<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-[1600px] mx-auto px-6 md:px-8 py-10 flex flex-col gap-12 relative z-10">
<section class="flex flex-col gap-6 w-full animate-fade-in-up">
<div class="flex flex-col lg:flex-row lg:items-end justify-between gap-4">
<div>
<h1 id="calendar-title" class="text-3xl font-headline font-semibold text-on-surface tracking-tight mb-1">Loading calendar...</h1>
<p class="text-on-surface-variant text-sm flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">calendar_today</span>
<span id="calendar-subtitle">Pulling events from your feed</span>
</p>
</div>
<div class="flex flex-col lg:flex-row gap-3 lg:items-center">
<!-- Weekly/Monthly Toggle -->
<div class="inline-flex items-center rounded-lg border border-outline-variant/20 bg-surface-container-low p-1">
<button id="calendar-view-week" type="button" class="px-3 py-1.5 text-sm rounded-md bg-primary text-on-primary font-medium">Weekly</button>
<button id="calendar-view-month" type="button" class="px-3 py-1.5 text-sm rounded-md text-on-surface-variant hover:text-on-surface">Monthly</button>
</div>

<!-- Navigation Controls -->
<div class="flex items-center gap-2 bg-surface-container-low p-1.5 rounded-lg border border-outline-variant/10 flex-wrap">
<button id="calendar-today" type="button" class="text-sm font-medium text-on-surface px-3 py-1 rounded-md hover:bg-surface-container-high">Today</button>
<div class="h-6 w-px bg-outline-variant/20"></div>
<!-- Calendars Dropdown -->
<div class="relative" id="calendar-popover-root">
<button id="calendar-toggle-menu" type="button" class="px-3 py-1.5 text-sm flex items-center gap-2 text-on-surface-variant hover:text-on-surface rounded-md hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-[18px]">calendar_month</span>
<span>Calendars</span>
</button>
<div id="calendar-menu" style="display:none;"></div>
</div>
<div class="h-6 w-px bg-outline-variant/20"></div>
<button id="calendar-prev" type="button" class="p-2 text-on-surface-variant hover:text-on-surface hover:bg-surface-container-high rounded-md transition-colors flex items-center justify-center" aria-label="Previous period">
<span class="material-symbols-outlined text-[20px]">chevron_left</span>
</button>
<button id="calendar-next" type="button" class="p-2 text-on-surface-variant hover:text-on-surface hover:bg-surface-container-high rounded-md transition-colors flex items-center justify-center" aria-label="Next period">
<span class="material-symbols-outlined text-[20px]">chevron_right</span>
</button>
</div>
</div>
</div>
<div class="bg-surface-container-low p-4 sm:p-5 rounded-2xl border border-outline-variant/10">
<div id="calendar-view-root"></div>
</div>
</section>

<section class="flex flex-col gap-6 w-full animate-fade-in-up" style="animation-delay: 100ms;">
<div class="flex items-center justify-between border-b border-surface-container-low pb-4">
<h2 class="text-xl font-headline font-semibold text-on-surface tracking-tight flex items-center gap-2">
<span class="material-symbols-outlined text-primary">assignment</span>
Upcoming Assignments
</h2>
</div>
<div id="assignments-root" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
</section>
</main>

<global class="thefooter"></global>
