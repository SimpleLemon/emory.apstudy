<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Canvas.APStudy.org - Sign In</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body { font-family: 'Inter', sans-serif; }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface": "#dfe2eb",
                        "secondary-container": "#2e4869",
                        "primary": "#a2c9ff",
                        "background": "#10141a",
                        "primary-fixed-dim": "#a2c9ff",
                        "on-primary-fixed": "#001c38",
                        "on-primary": "#00315c",
                        "primary-fixed": "#d3e4ff",
                        "on-error": "#690005",
                        "primary-container": "#58a6ff",
                        "surface-tint": "#a2c9ff",
                        "on-tertiary-container": "#4f3400",
                        "tertiary-fixed-dim": "#ffba42",
                        "on-background": "#dfe2eb",
                        "tertiary-container": "#da9600",
                        "on-tertiary-fixed-variant": "#614000",
                        "surface-container-high": "#262a31",
                        "surface-bright": "#353940",
                        "surface": "#10141a",
                        "on-secondary-fixed": "#001c38",
                        "on-tertiary": "#432c00",
                        "tertiary": "#ffba42",
                        "on-surface-variant": "#c0c7d4",
                        "error": "#ffb4ab",
                        "inverse-surface": "#dfe2eb",
                        "on-secondary-container": "#9db7dd",
                        "error-container": "#93000a",
                        "on-primary-container": "#003a6b",
                        "secondary-fixed-dim": "#aec8ef",
                        "on-secondary": "#163151",
                        "outline": "#8b919d",
                        "on-tertiary-fixed": "#281800",
                        "surface-container-highest": "#31353c",
                        "secondary-fixed": "#d3e4ff",
                        "outline-variant": "#414752",
                        "inverse-on-surface": "#2d3137",
                        "surface-container": "#1c2026",
                        "surface-dim": "#10141a",
                        "tertiary-fixed": "#ffddaf",
                        "inverse-primary": "#0060aa",
                        "on-error-container": "#ffdad6",
                        "on-secondary-fixed-variant": "#2e4869",
                        "surface-container-low": "#181c22",
                        "surface-variant": "#31353c",
                        "surface-container-lowest": "#0a0e14",
                        "secondary": "#aec8ef",
                        "on-primary-fixed-variant": "#004882"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {},
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-surface min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
<!-- Ambient background glow to fit "The Digital Monolith" theme -->
<div class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-surface-container-low/50 via-background to-background -z-10"></div>
<!-- Main Card Container -->
<div class="relative w-full max-w-[420px]">
<!-- Ghost border glow for elevation -->
<div class="absolute -inset-[1px] bg-gradient-to-br from-outline-variant/20 to-transparent rounded-[14px] blur-[2px] opacity-50 pointer-events-none"></div>
<main class="bg-surface-container rounded-xl shadow-[0_20px_40px_rgba(0,0,0,0.4)] relative z-10 flex flex-col pt-12 pb-10 px-8 sm:px-10">
<!-- Branding Header -->
<div class="flex flex-col items-center mb-10 text-center">
<div class="w-12 h-12 rounded-lg bg-gradient-to-br from-primary to-primary-container flex items-center justify-center mb-6 shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-on-primary-container text-3xl" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
<h1 class="font-headline font-semibold text-2xl tracking-tight text-on-surface mb-2">Welcome Back</h1>
<p class="font-body text-sm text-on-surface-variant font-medium tracking-tight">Canvas.APStudy.org</p>
</div>
<!-- Login Form -->
<form action="#" class="flex flex-col gap-6" method="POST">
<!-- Username Field -->
<div class="flex flex-col gap-2">
<label class="font-label text-[11px] uppercase tracking-[0.05em] text-on-surface-variant font-medium ml-1" for="username">Username / ID</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest text-on-surface rounded-lg px-4 py-3.5 text-sm font-body focus:outline-none ring-1 ring-outline-variant/15 focus:ring-primary/50 transition-all duration-150 placeholder:text-outline/50 shadow-inner" id="username" name="username" placeholder="e.g. jdoe123" required="" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center ml-1">
<label class="font-label text-[11px] uppercase tracking-[0.05em] text-on-surface-variant font-medium" for="password">Password</label>
<a class="text-xs text-primary hover:text-primary-fixed transition-colors font-medium" href="#">Forgot?</a>
</div>
<div class="relative">
<input class="w-full bg-surface-container-lowest text-on-surface rounded-lg px-4 py-3.5 text-sm font-body focus:outline-none ring-1 ring-outline-variant/15 focus:ring-primary/50 transition-all duration-150 placeholder:text-outline/50 shadow-inner" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Action Button -->
<button class="mt-2 w-full bg-gradient-to-br from-primary to-primary-container text-on-primary-container font-headline font-semibold py-3.5 rounded-lg shadow-lg shadow-primary/10 hover:scale-[1.02] active:scale-[0.98] transition-all duration-150 flex items-center justify-center gap-2" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
<!-- Hidden Error Message Placeholder -->
<div class="hidden mt-2 p-3 rounded bg-error-container/20 ring-1 ring-error-container border-l-4 border-error text-sm text-error font-body flex items-start gap-2" id="error-message">
<span class="material-symbols-outlined text-lg shrink-0">error</span>
<p>Invalid credentials. Please verify your ID and try again.</p>
</div>
</form>
<!-- Footer subtle links -->
<div class="mt-8 text-center">
<p class="text-xs text-on-surface-variant font-body">
                    Need technical support? <a class="text-primary hover:underline underline-offset-2" href="#">Contact IT</a>
</p>
</div>
</main>
</div>
</body></html>
